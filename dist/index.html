<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>健康风险画像评估系统</title>
  <meta name="description" content="一个开源的健康风险画像评估系统，基于15个健康行为维度进行科学化分析和匹配。了解你的健康风险类型，获得改善建议。" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>" />
  <script type="module" crossorigin src="/SBTI/assets/index-B8QcHaGA.js"></script>
  <link rel="stylesheet" crossorigin href="/SBTI/assets/index-DCGHM5Gu.css">
</head>
<body>
  <div id="app">
    <!-- 首页 -->
    <section id="page-intro" class="page active">
      <div class="card intro-card">
        <h1 class="intro-title">你的身体，<br/>正在悄悄告诉你一些事。</h1>
        <button id="btn-start" class="btn btn-primary">开始评估</button>
        <p class="intro-credit">开源项目 · 健康风险画像评估系统</p>
        <p class="intro-note">本评估仅供健康教育参考</p>
      </div>
    </section>

    <!-- 答题页 -->
    <section id="page-quiz" class="page">
      <div class="card quiz-card">
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="progress-text" id="progress-text">0 / 31</div>
        <div class="question-area">
          <p class="question-text" id="question-text"></p>
        </div>
        <div class="options" id="options"></div>
      </div>
    </section>

    <!-- 结果页 -->
    <section id="page-result" class="page">
      <div class="card result-card" id="result-card">

        <!-- 左右分栏：角色卡 + 信息面板 -->
        <div class="result-hero-row">

          <!-- 左侧：角色卡（图片区域） -->
          <div class="result-char-card" id="result-char-card">
            <div class="char-type-name" id="char-type-name"></div>
            <div class="char-type-code" id="char-type-code"></div>
            <!-- 图片占位符区域 -->
            <div class="char-illus" id="char-illus">
              <!-- 在此插入你的图片，例如：<img src="your-image.jpg" alt="角色" /> -->
            </div>
            <div class="char-tagline" id="char-tagline"></div>
          </div>

          <!-- 右侧：信息面板（含 kicker） -->
          <div class="result-info-panel">
            <div class="result-kicker" id="result-kicker">你的主类型</div>
            <div class="result-code" id="result-code"></div>
            <div class="result-name" id="result-name"></div>
            <div class="result-badge" id="result-badge"></div>
            <div class="result-intro" id="result-intro"></div>
            <div class="result-desc" id="result-desc"></div>
          </div>
        </div>

        <div class="result-secondary" id="result-secondary" style="display:none">
          <div class="secondary-label">次要匹配</div>
          <div class="secondary-info" id="secondary-info"></div>
        </div>

        <h3 class="section-title">十五维度评分</h3>
        <canvas id="radar-chart" width="320" height="320"></canvas>
        <div class="dimensions-detail" id="dimensions-detail"></div>

        <div class="result-top3">
          <h3 class="section-title">最佳匹配 TOP 5</h3>
          <div id="top-list"></div>
        </div>

        <div class="disclaimer" id="disclaimer"></div>

        <div class="result-actions">
          <button id="btn-download" class="btn btn-primary">保存分享图片</button>
          <button id="btn-restart" class="btn btn-secondary">重新测试</button>
        </div>

        <div class="agent-section">
          <p class="agent-title">想自己搭一个？</p>
          <div class="agent-cmd">
            <code>git clone https://github.com/jonk-wu/HBTI.git && cd HBTI && npm install && npm run dev</code>
          </div>
          <button id="btn-agent" class="btn btn-agent">复制一键部署命令</button>
          <p class="agent-hint">粘贴到 Claude Code / OpenClaw 即可一键运行并自定义</p>
        </div>
      </div>
    </section>
  </div>

</body>
</html>
